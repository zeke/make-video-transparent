<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparent Video</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    video {
      max-width: 90vw;
      max-height: 70vh;
      background-color: dodgerblue;
    }

    .controls {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .controls label {
      font-size: 0.875rem;
    }

    .controls input[type="color"] {
      border: none;
      width: 3rem;
      height: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <video controls loop playsinline>
    <source src="demo.mov" type="video/mp4; codecs=hvc1">
    <source src="demo.webm" type="video/webm">
  </video>

  <div class="controls">
    <label for="bg">Background color:</label>
    <input type="color" id="bg" value="#1e90ff">
  </div>

  <script>
    const video = document.querySelector('video');
    const picker = document.getElementById('bg');
    picker.addEventListener('input', (e) => {
      video.style.backgroundColor = e.target.value;
    });
  </script>
</body>
</html>
