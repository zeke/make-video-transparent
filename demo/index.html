<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transparent Video</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      font-family: system-ui, sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    video {
      max-width: 90vw;
      max-height: 70vh;
      background-color: dodgerblue;
    }

    .swatches {
      display: flex;
      width: 90vw;
      max-width: 90vw;
    }

    .swatch {
      flex: 1;
      height: 2.5rem;
      border: none;
      cursor: pointer;
      transition: scale 0.1s ease;
    }

    .swatch:hover {
      scale: 1 1.4;
    }

    .swatch:first-child {
      border-radius: 0.25rem 0 0 0.25rem;
    }

    .swatch:last-child {
      border-radius: 0 0.25rem 0.25rem 0;
    }
  </style>
</head>
<body>
  <video controls loop playsinline>
    <source src="demo.mov" type="video/mp4; codecs=hvc1">
    <source src="demo.webm" type="video/webm">
  </video>

  <div class="swatches">
    <button class="swatch" style="background: #ff0000" data-color="#ff0000"></button>
    <button class="swatch" style="background: #ff7f00" data-color="#ff7f00"></button>
    <button class="swatch" style="background: #ffff00" data-color="#ffff00"></button>
    <button class="swatch" style="background: #00ff00" data-color="#00ff00"></button>
    <button class="swatch" style="background: #0000ff" data-color="#0000ff"></button>
    <button class="swatch" style="background: #4b0082" data-color="#4b0082"></button>
    <button class="swatch" style="background: #9400d3" data-color="#9400d3"></button>
  </div>

  <script>
    const video = document.querySelector('video');
    document.querySelectorAll('.swatch').forEach(swatch => {
      swatch.addEventListener('click', () => {
        video.style.backgroundColor = swatch.dataset.color;
      });
    });
  </script>
</body>
</html>
